<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SFF">
<meta name="theme-color" content="#16A34A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Satrio's Family Finance</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#16A34A;--pmid:#22C55E;--plight:#DCFCE7;--pxlight:#F0FDF4;--danger:#EF4444;--dlight:#FEF2F2;--warning:#F59E0B;--bg:#F0FDF4;--card:#fff;--text:#14532D;--textl:#6B7280;--border:#D1FAE5;--r:16px;--shadow:0 2px 16px rgba(22,163,74,.10);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:84px;}
.header{background:linear-gradient(135deg,#15803D,#22C55E);color:#fff;padding:0 16px;height:68px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 14px rgba(22,163,74,.22);}
.header-logo{width:42px;height:42px;border-radius:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.header-title{font-size:15px;font-weight:800;line-height:1.2;}
.header-sub{font-size:11px;opacity:.82;margin-top:1px;}
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#F0FDF4,#DCFCE7);}
.auth-logo{width:88px;height:88px;border-radius:22px;box-shadow:0 6px 24px rgba(22,163,74,.25);margin-bottom:16px;}
.auth-title{font-size:22px;font-weight:800;color:var(--text);text-align:center;}
.auth-sub{font-size:14px;color:var(--textl);text-align:center;margin-top:6px;margin-bottom:32px;}
.auth-card{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(22,163,74,.12);border:1px solid var(--border);}
.auth-tabs{display:flex;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:700;cursor:pointer;background:#fff;color:var(--textl);border:none;}
.auth-tab.active{background:var(--primary);color:#fff;}
.auth-msg{font-size:13px;text-align:center;padding:10px;border-radius:10px;margin-bottom:12px;display:none;}
.auth-msg.error{background:var(--dlight);color:var(--danger);display:block;}
.auth-msg.success{background:var(--plight);color:var(--primary);display:block;}
.loading-screen{position:fixed;inset:0;background:linear-gradient(160deg,#F0FDF4,#DCFCE7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.loading-logo{width:72px;height:72px;border-radius:18px;margin-bottom:16px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(.96);opacity:.8;}}
.loading-text{font-size:14px;color:var(--textl);font-weight:600;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid var(--border);display:flex;z-index:200;box-shadow:0 -4px 20px rgba(22,163,74,.10);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 14px;border:none;background:none;cursor:pointer;color:var(--textl);font-size:10px;gap:4px;font-weight:500;}
.nav-btn svg{width:22px;height:22px;}
.nav-btn.active{color:var(--primary);}
.page{display:none;padding:14px;}
.page.active{display:block;}
.card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border);}
.card-title{font-size:12px;color:var(--textl);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);border:1px solid var(--border);}
.stat-label{font-size:11px;color:var(--textl);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.stat-value{font-size:17px;font-weight:800;margin-top:5px;color:var(--text);line-height:1.2;}
.stat-card.over .stat-value{color:var(--danger);}
.stat-sub{font-size:11px;margin-top:3px;color:var(--primary);font-weight:600;}
.stat-sub.over{color:var(--danger);}
.period-picker{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border);}
.period-lbl{font-size:12px;color:var(--textl);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.period-type-row{display:flex;gap:6px;margin-bottom:12px;}
.period-type-btn{flex:1;padding:9px 4px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--textl);text-align:center;}
.period-type-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.month-nav{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.mnav-btn{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:18px;cursor:pointer;color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.mnav-btn:disabled{opacity:.3;cursor:default;}
.month-cur{flex:1;text-align:center;font-size:15px;font-weight:700;}
.week-info{text-align:center;font-size:14px;font-weight:600;padding:8px 0;}
.custom-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.custom-row input{flex:1;min-width:110px;padding:9px 10px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;color:var(--text);background:#fff;outline:none;}
.custom-row input:focus{border-color:var(--primary);}
.custom-sep{font-size:12px;color:var(--textl);}
.apply-btn{padding:9px 14px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.period-summary{font-size:12px;color:var(--primary);font-weight:600;margin-top:10px;text-align:center;background:var(--plight);padding:6px 10px;border-radius:8px;}
.cat-item{margin-bottom:16px;}.cat-item:last-child{margin-bottom:0;}
.cat-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;gap:6px;}
.cat-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;min-width:0;}
.cat-emoji{font-size:18px;flex-shrink:0;}
.cat-right{text-align:right;flex-shrink:0;}
.cat-spent{font-size:14px;font-weight:700;}
.cat-budg{font-size:11px;color:var(--textl);}
.prog-bar{height:8px;border-radius:4px;background:var(--bg);overflow:hidden;border:1px solid var(--border);}
.prog-fill{height:100%;border-radius:4px;background:var(--pmid);transition:width .5s ease;}
.prog-fill.danger{background:var(--danger);}.prog-fill.warning{background:var(--warning);}
.badge-over{display:inline-block;font-size:9px;font-weight:700;background:var(--danger);color:#fff;padding:2px 6px;border-radius:8px;margin-left:4px;}
.sec-title{font-size:16px;font-weight:800;margin-bottom:14px;}
.fg{margin-bottom:13px;}
.fl{display:block;font-size:13px;font-weight:600;color:var(--textl);margin-bottom:6px;}
.fi,.fs{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;color:var(--text);background:#fff;outline:none;-webkit-appearance:none;}
.fi:focus,.fs:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--plight);}
.fi[type=number]{-moz-appearance:textfield;}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;}
.btn-p{background:linear-gradient(135deg,#16A34A,#22C55E);color:#fff;box-shadow:0 3px 12px rgba(22,163,74,.25);}
.btn-p:active{opacity:.88;transform:scale(.98);}
.btn-ghost{background:var(--pxlight);color:var(--textl);border:1.5px solid var(--border);}
.tx-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);}
.tx-item:last-child{border-bottom:none;}
.tx-icon{width:40px;height:40px;border-radius:12px;background:var(--plight);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;border:1px solid var(--border);}
.tx-info{flex:1;min-width:0;}
.tx-cat{font-size:14px;font-weight:700;}
.tx-note{font-size:12px;color:var(--textl);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-date{font-size:11px;color:var(--textl);margin-top:1px;}
.tx-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.tx-amt{font-size:14px;font-weight:800;color:var(--danger);}
.tx-del{width:26px;height:26px;border-radius:7px;border:none;background:var(--dlight);color:var(--danger);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.day-group{margin-bottom:4px;}
.day-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--pxlight);border-radius:10px;cursor:pointer;border:1px solid var(--border);margin-bottom:2px;}
.day-lbl{font-size:13px;font-weight:700;}.day-tot{font-size:13px;font-weight:800;color:var(--danger);}
.day-chevron{font-size:11px;color:var(--textl);margin-left:6px;}
.day-txs{padding:0 4px;}.day-txs.collapsed{display:none;}
.filter-section-label{font-size:11px;color:var(--textl);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px;}
.filter-row::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;cursor:pointer;color:var(--textl);font-weight:600;}
.chip.active{background:var(--plight);border-color:var(--primary);color:var(--primary);}
.view-toggle{display:flex;gap:6px;margin-bottom:14px;}
.view-btn{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--textl);text-align:center;}
.view-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.sort-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.sort-lbl{font-size:13px;color:var(--textl);white-space:nowrap;font-weight:600;}
.sort-sel{flex:1;padding:8px 10px;border-radius:9px;border:1.5px solid var(--border);font-size:13px;background:#fff;color:var(--text);-webkit-appearance:none;outline:none;}
.summary-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.summary-row::-webkit-scrollbar{display:none;}
.sum-chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;text-align:center;box-shadow:var(--shadow);}
.sum-chip-label{font-size:10px;color:var(--textl);font-weight:600;text-transform:uppercase;}
.sum-chip-val{font-size:14px;font-weight:800;color:var(--text);margin-top:3px;}
.sum-chip-val.red{color:var(--danger);}
.cmi{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
.cmi:last-child{border-bottom:none;}
.cmi-emoji{font-size:22px;width:36px;text-align:center;flex-shrink:0;}
.cmi-info{flex:1;min-width:0;}.cmi-name{font-size:14px;font-weight:700;}.cmi-bud{font-size:12px;color:var(--textl);}
.cmi-del{width:30px;height:30px;border-radius:8px;border:none;background:var(--dlight);color:var(--danger);cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.profile-card{background:linear-gradient(135deg,#15803D,#22C55E);border-radius:var(--r);padding:20px;margin-bottom:12px;color:#fff;display:flex;align-items:center;gap:14px;}
.profile-avatar{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.profile-name{font-size:16px;font-weight:800;}.profile-email{font-size:12px;opacity:.82;margin-top:2px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22C55E;display:inline-block;margin-left:6px;vertical-align:middle;}
.sync-dot.syncing{background:var(--warning);animation:blink .8s infinite;}
.sync-dot.error{background:var(--danger);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.empty{text-align:center;padding:36px 20px;color:var(--textl);}
.empty-icon{font-size:44px;margin-bottom:10px;}.empty-text{font-size:14px;line-height:1.5;}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:#14532D;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:500;opacity:0;transition:opacity .25s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2);font-weight:600;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>

<script>
const _url = 'https://vlhwuqtpdorxprzloqf.supabase.co';
const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsaHV3dXF0cGRvcnhwcnpsb3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODc0MDcsImV4cCI6MjA5MTE2MzQwN30._KsW15wyhESfoWFVuq5LHur4eJiVoGkr52OVLx3brzQ';
const sb = supabase.createClient(_url, _key);

let cats=[], txs=[];
let hP={type:'monthly',mo:0,cs:'',ce:''};
let tP={type:'monthly',mo:0,cs:'',ce:''};
let tFilter='all', tView='list', expandedDays={};

const rp=n=>'Rp '+Number(n).toLocaleString('id-ID');
const fd=s=>new Date(s+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
const fdS=s=>new Date(s+'T00:00:00').toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'});
const td=()=>new Date().toISOString().slice(0,10);
const addD=(s,n)=>{const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function sync(s){const d=document.getElementById('syncDot');if(d)d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');}

let authMode='login';
function switchTab(m){
  authMode=m;
  document.getElementById('tabLogin').className='auth-tab'+(m==='login'?' active':'');
  document.getElementById('tabRegister').className='auth-tab'+(m==='register'?' active':'');
  document.getElementById('authNameGroup').style.display=m==='register'?'block':'none';
  document.getElementById('authBtn').textContent=m==='login'?'Masuk':'Daftar Akun';
  document.getElementById('authMsg').className='auth-msg';
}
function showMsg(msg,type='error'){const el=document.getElementById('authMsg');el.textContent=msg;el.className='auth-msg '+type;}

async function doAuth(){
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPass').value;
  const name=document.getElementById('authName').value.trim();
  if(!email||!pass){showMsg('Isi email dan password dulu ya!');return;}
  const btn=document.getElementById('authBtn');
  btn.textContent='Memproses...';btn.disabled=true;
  try{
    if(authMode==='register'){
      if(!name){showMsg('Isi nama dulu ya!');btn.textContent='Daftar Akun';btn.disabled=false;return;}
      const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
      if(error)throw error;
      if(data.session){
        await startApp();
      } else {
        showMsg('Pendaftaran berhasil! Silakan masuk.','success');
        switchTab('login');
      }
    } else {
      const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error)throw error;
      await startApp();
    }
  }catch(e){
    const msg=e.message==='Invalid login credentials'?'Email atau password salah!':e.message;
    showMsg(msg);
  }
  btn.textContent=authMode==='login'?'Masuk':'Daftar Akun';btn.disabled=false;
}

async function doLogout(){
  await sb.auth.signOut();
  cats=[];txs=[];
  document.getElementById('mainApp').style.display='none';
  document.getElementById('authScreen').style.display='flex';
}

async function loadData(){
  sync('syncing');
  try{
    const {data:c}=await sb.from('categories').select('*').order('created_at');
    const {data:t}=await sb.from('transactions').select('*').order('date',{ascending:false});
    cats=c||[];txs=t||[];sync('ok');
  }catch(e){sync('error');toast('⚠️ Gagal memuat: '+e.message);}
}

async function startApp(){
  const {data:{user}}=await sb.auth.getUser();
  await loadData();
  document.getElementById('profileName').textContent=user?.user_metadata?.full_name||user?.email||'Pengguna';
  document.getElementById('profileEmail').textContent=user?.email||'';
  document.getElementById('authScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  ra();
}

function pRange(p){
  const now=new Date();
  if(p.type==='monthly'){const s=new Date(now.getFullYear(),now.getMonth()+p.mo,1),e=new Date(now.getFullYear(),now.getMonth()+p.mo+1,0);return{start:s.toISOString().slice(0,10),end:e.toISOString().slice(0,10)};}
  if(p.type==='week7'){const t=td();return{start:addD(t,-6),end:t};}
  return{start:p.cs||td(),end:p.ce||td()};
}
function pLabel(p){
  if(p.type==='monthly'){const now=new Date();const d=new Date(now.getFullYear(),now.getMonth()+p.mo,1);return d.toLocaleDateString('id-ID',{month:'long',year:'numeric'});}
  const r=pRange(p);return fd(r.start)+' – '+fd(r.end);
}
const inP=(tx,p)=>{const r=pRange(p);return tx.date>=r.start&&tx.date<=r.end;};

function renderPP(id,p,ns){
  const el=document.getElementById(id);if(!el)return;
  const t=td(),w7=addD(t,-6);
  const now=new Date(),mDate=new Date(now.getFullYear(),now.getMonth()+p.mo,1);
  const mLbl=mDate.toLocaleDateString('id-ID',{month:'long',year:'numeric'});
  el.innerHTML=`<div class="period-picker"><div class="period-lbl">📅 Lihat Periode</div>
  <div class="period-type-row">
    <button class="period-type-btn ${p.type==='monthly'?'active':''}" onclick="${ns}T('monthly')">Bulanan</button>
    <button class="period-type-btn ${p.type==='week7'?'active':''}" onclick="${ns}T('week7')">7 Hari</button>
    <button class="period-type-btn ${p.type==='custom'?'active':''}" onclick="${ns}T('custom')">Pilih Tanggal</button>
  </div>
  ${p.type==='monthly'?`<div class="month-nav"><button class="mnav-btn" onclick="${ns}M(-1)">‹</button><div class="month-cur">${mLbl}</div><button class="mnav-btn" onclick="${ns}M(1)" ${p.mo>=0?'disabled':''}>›</button></div>`:''}
  ${p.type==='week7'?`<div class="week-info">📆 ${fd(w7)} — ${fd(t)}</div>`:''}
  ${p.type==='custom'?`<div class="custom-row"><input type="date" id="${id}_s" value="${p.cs||t}" max="${t}"><span class="custom-sep">s/d</span><input type="date" id="${id}_e" value="${p.ce||t}" max="${t}"><button class="apply-btn" onclick="${ns}A()">Tampilkan</button></div>`:''}
  <div class="period-summary">Menampilkan: ${pLabel(p)}</div></div>`;
}
function hT(v){hP.type=v;ra();}function hM(d){if(hP.mo+d<=0){hP.mo+=d;ra();}}
function hA(){const s=document.getElementById('homePP_s')?.value,e=document.getElementById('homePP_e')?.value;if(!s||!e){toast('⚠️ Pilih tanggal dulu');return;}if(s>e){toast('⚠️ Tanggal awal harus lebih awal');return;}hP.cs=s;hP.ce=e;ra();}
function tT(v){tP.type=v;ra();}function tM(d){if(tP.mo+d<=0){tP.mo+=d;ra();}}
function tA(){const s=document.getElementById('tablePP_s')?.value,e=document.getElementById('tablePP_e')?.value;if(!s||!e){toast('⚠️ Pilih tanggal dulu');return;}if(s>e){toast('⚠️ Tanggal awal harus lebih awal');return;}tP.cs=s;tP.ce=e;ra();}

function goTo(pg){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+pg).classList.add('active');
  const nb=document.getElementById('nav-'+pg);if(nb)nb.classList.add('active');
  ra();
}
function setView(v){
  tView=v;
  document.getElementById('vbList').className='view-btn'+(v==='list'?' active':'');
  document.getElementById('vbDaily').className='view-btn'+(v==='daily'?' active':'');
  document.getElementById('sortRowEl').style.display=v==='daily'?'none':'flex';
  renderTableContent();
}

function txHtml(tx,hideDate=false){
  const c=cats.find(c=>c.id===tx.category_id);
  return `<div class="tx-item">
    <div class="tx-icon">${c?(c.emoji||'📁'):'❓'}</div>
    <div class="tx-info">
      <div class="tx-cat">${c?c.name:'Terhapus'}</div>
      <div class="tx-note">${tx.note||'—'}</div>
      ${!hideDate?`<div class="tx-date">${fd(tx.date)}</div>`:''}
    </div>
    <div class="tx-r">
      <div class="tx-amt">-${rp(tx.amount)}</div>
      <button class="tx-del" onclick="delTx('${tx.id}')">🗑</button>
    </div>
  </div>`;
}

async function addTx(){
  const date=document.getElementById('txDate').value;
  const catId=document.getElementById('txCat').value;
  const amount=parseFloat(document.getElementById('txAmt').value);
  const note=document.getElementById('txNote').value.trim();
  if(!date||!catId||!amount||amount<=0){toast('⚠️ Isi tanggal, kategori, dan jumlah dulu!');return;}
  sync('syncing');
  const {data:{user}}=await sb.auth.getUser();
  const{data,error}=await sb.from('transactions').insert({category_id:catId,amount,date,note,user_id:user.id}).select();
  if(error){sync('error');toast('❌ Gagal: '+error.message);return;}
  txs.unshift(data[0]);
  document.getElementById('txAmt').value='';document.getElementById('txNote').value='';
  toast('✅ Berhasil dicatat!');sync('ok');ra();
}

async function delTx(id){
  if(!confirm('Hapus transaksi ini?'))return;
  sync('syncing');
  const{error}=await sb.from('transactions').delete().eq('id',id);
  if(error){sync('error');toast('❌ Gagal');return;}
  txs=txs.filter(t=>t.id!==id);sync('ok');ra();toast('🗑 Dihapus');
}

function renderSummary(list){
  const el=document.getElementById('txSummary');if(!el)return;
  const total=list.reduce((s,t)=>s+t.amount,0);
  const days=[...new Set(list.map(t=>t.date))].length;
  const big=list.length?Math.max(...list.map(t=>t.amount)):0;
  el.innerHTML=`<div class="sum-chip"><div class="sum-chip-label">Total</div><div class="sum-chip-val red">${rp(total)}</div></div>
    <div class="sum-chip"><div class="sum-chip-label">Transaksi</div><div class="sum-chip-val">${list.length}x</div></div>
    <div class="sum-chip"><div class="sum-chip-label">Rata-rata/hari</div><div class="sum-chip-val">${rp(days?Math.round(total/days):0)}</div></div>
    <div class="sum-chip"><div class="sum-chip-label">Terbesar</div><div class="sum-chip-val red">${big?rp(big):'—'}</div></div>`;
}
function renderFilters(){
  const el=document.getElementById('filterRow');if(!el)return;
  el.innerHTML=`<div class="chip ${tFilter==='all'?'active':''}" onclick="setF('all')">Semua</div>`+
    cats.map(c=>`<div class="chip ${tFilter===c.id?'active':''}" onclick="setF('${c.id}')">${c.emoji||'📁'} ${c.name}</div>`).join('');
}
function setF(id){tFilter=id;renderFilters();renderTableContent();}
function getFiltered(){let l=txs.filter(tx=>inP(tx,tP));if(tFilter!=='all')l=l.filter(tx=>tx.category_id===tFilter);return l;}
function renderTableContent(){
  const el=document.getElementById('tableContent');if(!el)return;
  const list=getFiltered();renderSummary(list);
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Tidak ada transaksi di periode ini.</div></div>`;return;}
  tView==='daily'?renderDailyView(el,list):renderListView(el,list);
}
function renderListView(el,list){
  const sort=document.getElementById('sortSel')?.value||'date-desc';
  const s=[...list].sort((a,b)=>sort==='date-desc'?b.date.localeCompare(a.date)||b.id-a.id:sort==='date-asc'?a.date.localeCompare(b.date)||a.id-b.id:sort==='amount-desc'?b.amount-a.amount:a.amount-b.amount);
  el.innerHTML=s.map(tx=>txHtml(tx)).join('');
}
function renderDailyView(el,list){
  const g={};list.forEach(tx=>{if(!g[tx.date])g[tx.date]=[];g[tx.date].push(tx);});
  const dates=Object.keys(g).sort((a,b)=>b.localeCompare(a));
  const t=td(),y=addD(t,-1);
  dates.forEach(d=>{if(expandedDays[d]===undefined)expandedDays[d]=true;});
  el.innerHTML=dates.map(date=>{
    const dayTxs=g[date].sort((a,b)=>b.amount-a.amount);
    const tot=dayTxs.reduce((s,t)=>s+t.amount,0);
    const exp=expandedDays[date];
    const lbl=date===t?'📍 Hari ini':date===y?'🕐 Kemarin':fdS(date);
    return `<div class="day-group">
      <div class="day-hdr" onclick="toggleDay('${date}')">
        <span class="day-lbl">${lbl}</span>
        <span style="display:flex;align-items:center"><span class="day-tot">-${rp(tot)}</span><span class="day-chevron">${exp?'▲':'▼'}</span></span>
      </div>
      <div class="day-txs ${exp?'':'collapsed'}" id="day_${date}">${dayTxs.map(tx=>txHtml(tx,true)).join('')}</div>
    </div>`;
  }).join('');
}
function toggleDay(date){
  expandedDays[date]=!expandedDays[date];
  const el=document.getElementById('day_'+date),hdr=el?.previousElementSibling;
  if(!el||!hdr)return;
  el.classList.toggle('collapsed',!expandedDays[date]);
  hdr.querySelector('.day-chevron').textContent=expandedDays[date]?'▲':'▼';
}

function renderHome(){
  const el=document.getElementById('catProg');if(!el)return;
  const spend={};txs.filter(tx=>inP(tx,hP)).forEach(tx=>{spend[tx.category_id]=(spend[tx.category_id]||0)+tx.amount;});
  const cnt=txs.filter(tx=>inP(tx,hP)).length;
  let tot=0,bud=0;
  if(!cats.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">Belum ada kategori.<br>Buat dulu di menu Kategori.</div></div>`;
    ['totalSpend','totalBudget','statSisa','statTx'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=id==='totalSpend'?rp(0):id==='totalBudget'?'—':'';});
    return;
  }
  el.innerHTML=cats.map(c=>{
    const sp=spend[c.id]||0,bg=c.budget||0;tot+=sp;bud+=bg;
    const pct=bg?Math.min((sp/bg)*100,100):0,over=bg&&sp>bg,warn=bg&&pct>=80&&!over;
    return `<div class="cat-item">
      <div class="cat-hdr">
        <div class="cat-name"><span class="cat-emoji">${c.emoji||'📁'}</span>${c.name}${over?'<span class="badge-over">Lewat!</span>':''}</div>
        <div class="cat-right"><div class="cat-spent" style="color:${over?'var(--danger)':warn?'var(--warning)':'var(--text)'}">${rp(sp)}</div>${bg?`<div class="cat-budg">dari ${rp(bg)}</div>`:''}</div>
      </div>
      ${bg?`<div class="prog-bar"><div class="prog-fill ${over?'danger':warn?'warning':''}" style="width:${pct}%"></div></div>`:''}
    </div>`;
  }).join('');
  document.getElementById('totalSpend').textContent=rp(tot);
  document.getElementById('totalBudget').textContent=bud?rp(bud):'—';
  document.getElementById('statTx').textContent=cnt+' transaksi';
  const sisaEl=document.getElementById('statSisa'),cardEl=document.getElementById('spendCard');
  if(bud){const sisa=bud-tot;sisaEl.textContent=sisa<0?'⚠ Lebih '+rp(-sisa):'Sisa '+rp(sisa);sisaEl.className='stat-sub'+(sisa<0?' over':'');cardEl.className='stat-card'+(sisa<0?' over':'');}
  else{sisaEl.textContent='';cardEl.className='stat-card';}
  const rTx=document.getElementById('recentTx');
  const recent=txs.filter(tx=>inP(tx,hP)).slice(0,5);
  rTx.innerHTML=recent.length?recent.map(tx=>txHtml(tx)).join(''):`<div class="empty"><div class="empty-icon">💸</div><div class="empty-text">Belum ada transaksi di periode ini.</div></div>`;
}

function renderCatOpts(){
  const s=document.getElementById('txCat');if(!s)return;const v=s.value;
  s.innerHTML='<option value="">-- Pilih Kategori --</option>'+cats.map(c=>`<option value="${c.id}">${c.emoji||'📁'} ${c.name}</option>`).join('');
  s.value=v;
}
function renderCatList(){
  const el=document.getElementById('catList');if(!el)return;
  el.innerHTML=cats.length?cats.map(c=>`<div class="cmi">
    <div class="cmi-emoji">${c.emoji||'📁'}</div>
    <div class="cmi-info"><div class="cmi-name">${c.name}</div><div class="cmi-bud">${c.budget?'Budget: '+rp(c.budget)+'/bln':'Tanpa batas budget'}</div></div>
    <button class="cmi-del" onclick="delCat('${c.id}')">✕</button>
  </div>`).join(''):`<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">Belum ada kategori.</div></div>`;
}
async function addCat(){
  const emoji=document.getElementById('cEmoji').value.trim()||'📁';
  const name=document.getElementById('cName').value.trim();
  const budget=parseFloat(document.getElementById('cBudget').value)||0;
  if(!name){toast('⚠️ Isi nama kategori dulu!');return;}
  if(cats.find(c=>c.name.toLowerCase()===name.toLowerCase())){toast('⚠️ Kategori sudah ada!');return;}
  sync('syncing');
  const {data:{user}}=await sb.auth.getUser();
  const{data,error}=await sb.from('categories').insert({emoji,name,budget,user_id:user.id}).select();
  if(error){sync('error');toast('❌ Gagal: '+error.message);return;}
  cats.push(data[0]);
  document.getElementById('cEmoji').value='';document.getElementById('cName').value='';document.getElementById('cBudget').value='';
  toast('✅ Kategori ditambahkan!');sync('ok');ra();
}
async function delCat(id){
  if(txs.some(t=>t.category_id===id)){toast('⚠️ Masih ada transaksi di kategori ini!');return;}
  if(!confirm('Hapus kategori ini?'))return;
  sync('syncing');
  const{error}=await sb.from('categories').delete().eq('id',id);
  if(error){sync('error');toast('❌ Gagal');return;}
  cats=cats.filter(c=>c.id!==id);sync('ok');ra();toast('🗑 Kategori dihapus');
}

function ra(){
  renderPP('homePP',hP,'h');renderPP('tablePP',tP,'t');
  renderHome();renderCatOpts();renderCatList();renderFilters();renderTableContent();
  document.getElementById('sortRowEl').style.display=tView==='daily'?'none':'flex';
}

window.onload=async()=>{
  const now=new Date();
  const dEl=document.getElementById('headerDate');
  if(dEl)dEl.textContent=now.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const txDEl=document.getElementById('txDate');if(txDEl)txDEl.value=now.toISOString().slice(0,10);
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

  const{data:{session}}=await sb.auth.getSession();
  document.getElementById('loadingScreen').style.display='none';
  if(session){
    await startApp();
  } else {
    document.getElementById('authScreen').style.display='flex';
  }
};
</script>
